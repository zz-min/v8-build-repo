name: Build V8 Native Libraries

# 수동 실행 (Actions 탭에서 Run workflow 클릭)
on:
  workflow_dispatch:
    inputs:
      platforms:
        description: '빌드할 플랫폼 (all / darwin-arm64 / darwin-x64 / linux-x64 / windows-x64)'
        required: true
        default: 'all'

env:
  V8_VERSION: "9.3.345.11"

jobs:
  # ===================================================
  # macOS Apple Silicon (M1/M2/M3/M4)
  # ===================================================
  darwin-arm64:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'darwin-arm64' }}
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 도구 설치
        run: |
          brew install ninja llvm
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: V8 소스 받기
        run: |
          cd $HOME
          mkdir v8-build && cd v8-build
          gclient config https://chromium.googlesource.com/v8/v8.git
          gclient sync --revision ${{ env.V8_VERSION }} --no-history --shallow

      - name: V8 소스 패치
        run: |
          bash patches/apply-patches.sh $HOME/v8-build/v8

      - name: V8 모놀리스 빌드
        run: |
          cd $HOME/v8-build/v8
          gn gen out/release --args='
            is_debug=false
            target_cpu="arm64"
            host_cpu="arm64"
            target_os="mac"
            v8_monolithic=true
            v8_use_external_startup_data=false
            is_component_build=false
            use_custom_libcxx=false
            use_lld=false
            v8_enable_i18n_support=false
            treat_warnings_as_errors=false
            clang_use_chrome_plugins=false
          '
          ninja -C out/release v8_monolith

      - name: JNI 브릿지 컴파일
        run: |
          mkdir -p build/darwin-arm64
          clang++ \
            -I$JAVA_HOME/include \
            -I$JAVA_HOME/include/darwin \
            -Iv8-include \
            -Ijni \
            -arch arm64 \
            -fPIC -std=c++17 -O3 -DNDEBUG \
            -DV8_COMPRESS_POINTERS \
            -DV8_31BIT_SMIS_ON_64BIT_ARCH \
            -w \
            -c jni/kr_co_coocon_v8_V8Impl.cpp \
            -o build/darwin-arm64/v8impl.o

          clang++ \
            -shared \
            -arch arm64 \
            -lc++ \
            -undefined dynamic_lookup \
            -o build/darwin-arm64/libcooconv8.dylib \
            build/darwin-arm64/v8impl.o \
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

      - name: 검증
        run: |
          file build/darwin-arm64/libcooconv8.dylib
          ls -lh build/darwin-arm64/libcooconv8.dylib

      - name: 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: |
            build/darwin-arm64/libcooconv8.dylib
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

  # ===================================================
  # macOS Intel
  # ===================================================
  darwin-x64:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'darwin-x64' }}
    runs-on: macos-15-intel
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 도구 설치
        run: |
          brew install ninja llvm
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: V8 소스 받기
        run: |
          cd $HOME
          mkdir v8-build && cd v8-build
          gclient config https://chromium.googlesource.com/v8/v8.git
          gclient sync --revision ${{ env.V8_VERSION }} --no-history --shallow

      - name: V8 소스 패치
        run: |
          bash patches/apply-patches.sh $HOME/v8-build/v8

      - name: V8 모놀리스 빌드
        run: |
          cd $HOME/v8-build/v8
          gn gen out/release --args='
            is_debug=false
            target_cpu="x64"
            host_cpu="x64"
            target_os="mac"
            v8_monolithic=true
            v8_use_external_startup_data=false
            is_component_build=false
            use_custom_libcxx=false
            use_lld=false
            v8_enable_i18n_support=false
            treat_warnings_as_errors=false
            clang_use_chrome_plugins=false
          '
          ninja -C out/release v8_monolith

      - name: JNI 브릿지 컴파일
        run: |
          mkdir -p build/darwin-x64
          clang++ \
            -I$JAVA_HOME/include \
            -I$JAVA_HOME/include/darwin \
            -Iv8-include \
            -Ijni \
            -arch x86_64 \
            -fPIC -std=c++17 -O3 -DNDEBUG \
            -DV8_COMPRESS_POINTERS \
            -DV8_31BIT_SMIS_ON_64BIT_ARCH \
            -w \
            -c jni/kr_co_coocon_v8_V8Impl.cpp \
            -o build/darwin-x64/v8impl.o

          clang++ \
            -shared \
            -arch x86_64 \
            -lc++ \
            -undefined dynamic_lookup \
            -o build/darwin-x64/libcooconv8.dylib \
            build/darwin-x64/v8impl.o \
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

      - name: 검증
        run: |
          file build/darwin-x64/libcooconv8.dylib
          ls -lh build/darwin-x64/libcooconv8.dylib

      - name: 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: darwin-x64
          path: |
            build/darwin-x64/libcooconv8.dylib
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

  # ===================================================
  # Linux x86_64
  # ===================================================
  linux-x64:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux-x64' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 도구 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang lld llvm
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: V8 소스 받기
        run: |
          cd $HOME
          mkdir v8-build && cd v8-build
          gclient config https://chromium.googlesource.com/v8/v8.git
          gclient sync --revision ${{ env.V8_VERSION }} --no-history --shallow

      - name: V8 소스 패치
        run: |
          bash patches/apply-patches.sh $HOME/v8-build/v8

      - name: V8 모놀리스 빌드
        run: |
          cd $HOME/v8-build/v8
          gn gen out/release --args='
            is_debug=false
            target_cpu="x64"
            host_cpu="x64"
            target_os="linux"
            v8_monolithic=true
            v8_use_external_startup_data=false
            is_component_build=false
            use_custom_libcxx=false
            v8_enable_i18n_support=false
            treat_warnings_as_errors=false
            clang_use_chrome_plugins=false
          '
          ninja -C out/release v8_monolith

      - name: JNI 브릿지 컴파일
        run: |
          mkdir -p build/linux-x64
          clang++ \
            -I$JAVA_HOME/include \
            -I$JAVA_HOME/include/linux \
            -Iv8-include \
            -Ijni \
            -fPIC -std=c++17 -O3 -DNDEBUG \
            -DV8_COMPRESS_POINTERS \
            -DV8_31BIT_SMIS_ON_64BIT_ARCH \
            -w \
            -c jni/kr_co_coocon_v8_V8Impl.cpp \
            -o build/linux-x64/v8impl.o

          clang++ \
            -shared \
            -o build/linux-x64/libcooconv8.so \
            build/linux-x64/v8impl.o \
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a \
            -lstdc++ -lrt \
            -s

      - name: 검증
        run: |
          file build/linux-x64/libcooconv8.so
          ls -lh build/linux-x64/libcooconv8.so

      - name: 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            build/linux-x64/libcooconv8.so
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

  # ===================================================
  # Windows x86_64
  # ===================================================
  windows-x64:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows-x64' }}
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: '0'    # Google 내부 toolchain 대신 로컬 Visual Studio 사용
      GYP_MSVS_VERSION: '2022'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: depot_tools 설치
        shell: cmd
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\depot_tools
          echo C:\depot_tools>> %GITHUB_PATH%

      - name: V8 소스 받기
        shell: cmd
        run: |
          set PATH=C:\depot_tools;%PATH%
          mkdir C:\v8-build
          cd /d C:\v8-build
          call gclient config https://chromium.googlesource.com/v8/v8.git
          call gclient sync --revision %V8_VERSION% --no-history --shallow

      - name: Windows 빌드 환경 패치 (VS 2022 + SDK 경로)
        shell: pwsh
        run: |
          # 1. vs_toolchain.py: MSVS_VERSIONS에 2022 추가
          $p = 'C:\v8-build\v8\build\vs_toolchain.py'
          $c = Get-Content $p -Raw
          $c = $c -replace "MSVS_VERSIONS = collections\.OrderedDict\(\[\s*\(`'2019`', `'16\.0`'\),\s*\(`'2017`', `'15\.0`'\),\s*\]\)", "MSVS_VERSIONS = collections.OrderedDict([('2022', '17.0'), ('2019', '16.0'), ('2017', '15.0')])"
          Set-Content $p -Value $c -NoNewline

          # 2. setup_toolchain.py: vcvarsall.bat 경로 수정 (VS 2022는 VC/Auxiliary/Build에 위치)
          $p2 = 'C:\v8-build\v8\build\toolchain\win\setup_toolchain.py'
          $c2 = Get-Content $p2 -Raw
          $c2 = $c2 -replace "VC/vcvarsall\.bat", "VC/Auxiliary/Build/vcvarsall.bat"
          Set-Content $p2 -Value $c2 -NoNewline

          # 3. jinja2/tests.py: collections.Mapping → collections.abc.Mapping (Python 3.10+ 호환)
          $p3 = 'C:\v8-build\v8\third_party\jinja2\tests.py'
          $c3 = Get-Content $p3 -Raw
          $c3 = $c3 -replace "from collections import Mapping", "from collections.abc import Mapping"
          Set-Content $p3 -Value $c3 -NoNewline

          Write-Host "[OK] vs_toolchain.py + setup_toolchain.py + jinja2 패치 완료"

      - name: VS 2022 경로 찾기
        shell: pwsh
        id: vs
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Write-Host "VS Install Path: $vs"
          echo "VS_INSTALL_PATH=$vs" >> $env:GITHUB_ENV

      - name: Windows SDK 경로 찾기
        shell: pwsh
        run: |
          $sdkDir = "C:\Program Files (x86)\Windows Kits\10"
          $sdkVer = (Get-ChildItem "$sdkDir\lib" | Where-Object { $_.Name -match "^10\." } | Sort-Object Name -Descending | Select-Object -First 1).Name
          Write-Host "Windows SDK: $sdkVer"
          echo "WINSDK_DIR=$sdkDir" >> $env:GITHUB_ENV
          echo "WINSDK_VER=$sdkVer" >> $env:GITHUB_ENV

      - name: V8 모놀리스 빌드
        shell: cmd
        run: |
          call "%VS_INSTALL_PATH%\VC\Auxiliary\Build\vcvarsall.bat" amd64
          set PATH=C:\depot_tools;%PATH%
          set GYP_MSVS_VERSION=2022
          set vs2022_install=%VS_INSTALL_PATH%
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          cd /d C:\v8-build\v8
          call gn.bat gen out/release --args="is_debug=false target_cpu=\"x64\" v8_monolithic=true v8_use_external_startup_data=false is_component_build=false v8_enable_i18n_support=false treat_warnings_as_errors=false is_clang=true use_lld=false"
          call ninja.exe -C out/release v8_monolith

      - name: JNI 브릿지 컴파일
        shell: cmd
        run: |
          call "%VS_INSTALL_PATH%\VC\Auxiliary\Build\vcvarsall.bat" amd64
          mkdir build\windows-x64
          set CLANG_CL=C:\v8-build\v8\third_party\llvm-build\Release+Asserts\bin\clang-cl.exe
          set LLD_LINK=C:\v8-build\v8\third_party\llvm-build\Release+Asserts\bin\lld-link.exe
          REM __config_site 생성 (V8 빌드에서 사용하는 libc++ 설정)
          (
            echo #define _LIBCPP_HAS_NO_ALIGNED_ALLOCATION
            echo #define _LIBCPP_ABI_UNSTABLE
            echo #define _LIBCPP_DISABLE_VISIBILITY_ANNOTATIONS
            echo #define _LIBCXXABI_DISABLE_VISIBILITY_ANNOTATIONS
            echo #define _LIBCPP_ENABLE_NODISCARD
            echo #define _LIBCPP_HAS_NO_VENDOR_AVAILABILITY_ANNOTATIONS
          ) > C:\v8-build\v8\buildtools\third_party\libc++\trunk\include\__config_site
          REM clang-cl로 컴파일 (V8과 동일한 libc++ 사용)
          %CLANG_CL% /std:c++17 /O2 /DNDEBUG /DV8_COMPRESS_POINTERS /DV8_31BIT_SMIS_ON_64BIT_ARCH /w ^
            -I"%JAVA_HOME%\include" -I"%JAVA_HOME%\include\win32" ^
            -Iv8-include -Ijni ^
            -IC:\v8-build\v8\buildtools\third_party\libc++\trunk\include ^
            -IC:\v8-build\v8\buildtools\third_party\libc++abi\trunk\include ^
            /c jni\kr_co_coocon_v8_V8Impl.cpp ^
            /Fobuild\windows-x64\v8impl.obj
          %LLD_LINK% /DLL /OUT:build\windows-x64\libcooconv8.dll /NODEFAULTLIB:libc++ ^
            build\windows-x64\v8impl.obj ^
            C:\v8-build\v8\out\release\obj\v8_monolith.lib ^
            C:\v8-build\v8\out\release\obj\buildtools\third_party\libc++\libc++\*.obj ^
            userenv.lib IPHLPAPI.lib Ws2_32.lib WINMM.lib psapi.lib advapi32.lib dbghelp.lib

      - name: 검증
        shell: cmd
        run: |
          dir build\windows-x64\libcooconv8.dll

      - name: 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            build/windows-x64/libcooconv8.dll
            C:/v8-build/v8/out/release/obj/v8_monolith.lib
