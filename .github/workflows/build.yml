name: Build V8 Native Libraries

# 수동 실행 (Actions 탭에서 Run workflow 클릭)
on:
  workflow_dispatch:
    inputs:
      platforms:
        description: '빌드할 플랫폼 (all / darwin-arm64 / darwin-x64 / linux-x64 / windows-x64)'
        required: true
        default: 'all'

env:
  V8_VERSION: "9.3.345.11"

jobs:
  # ===================================================
  # macOS Apple Silicon (M1/M2/M3/M4)
  # ===================================================
  darwin-arm64:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'darwin-arm64' }}
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 도구 설치
        run: |
          brew install ninja llvm
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: V8 소스 받기
        run: |
          cd $HOME
          mkdir v8-build && cd v8-build
          gclient config https://chromium.googlesource.com/v8/v8.git
          gclient sync --revision ${{ env.V8_VERSION }} --no-history --shallow

      - name: V8 소스 패치
        run: |
          bash patches/apply-patches.sh $HOME/v8-build/v8

      - name: V8 모놀리스 빌드
        run: |
          cd $HOME/v8-build/v8
          gn gen out/release --args='
            is_debug=false
            target_cpu="arm64"
            host_cpu="arm64"
            target_os="mac"
            v8_monolithic=true
            v8_use_external_startup_data=false
            is_component_build=false
            use_custom_libcxx=false
            use_lld=false
            v8_enable_i18n_support=false
            treat_warnings_as_errors=false
            clang_use_chrome_plugins=false
          '
          ninja -C out/release v8_monolith

      - name: JNI 브릿지 컴파일
        run: |
          mkdir -p build/darwin-arm64
          clang++ \
            -I$JAVA_HOME/include \
            -I$JAVA_HOME/include/darwin \
            -Iv8-include \
            -Ijni \
            -arch arm64 \
            -fPIC -std=c++17 -O3 -DNDEBUG \
            -DV8_COMPRESS_POINTERS \
            -DV8_31BIT_SMIS_ON_64BIT_ARCH \
            -w \
            -c jni/kr_co_coocon_v8_V8Impl.cpp \
            -o build/darwin-arm64/v8impl.o

          clang++ \
            -shared \
            -arch arm64 \
            -lc++ \
            -undefined dynamic_lookup \
            -o build/darwin-arm64/libcooconv8.dylib \
            build/darwin-arm64/v8impl.o \
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

      - name: 검증
        run: |
          file build/darwin-arm64/libcooconv8.dylib
          ls -lh build/darwin-arm64/libcooconv8.dylib

      - name: 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: |
            build/darwin-arm64/libcooconv8.dylib
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

  # ===================================================
  # macOS Intel
  # ===================================================
  darwin-x64:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'darwin-x64' }}
    runs-on: macos-13
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 도구 설치
        run: |
          brew install ninja llvm
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: V8 소스 받기
        run: |
          cd $HOME
          mkdir v8-build && cd v8-build
          gclient config https://chromium.googlesource.com/v8/v8.git
          gclient sync --revision ${{ env.V8_VERSION }} --no-history --shallow

      - name: V8 소스 패치
        run: |
          bash patches/apply-patches.sh $HOME/v8-build/v8

      - name: V8 모놀리스 빌드
        run: |
          cd $HOME/v8-build/v8
          gn gen out/release --args='
            is_debug=false
            target_cpu="x64"
            host_cpu="x64"
            target_os="mac"
            v8_monolithic=true
            v8_use_external_startup_data=false
            is_component_build=false
            use_custom_libcxx=false
            use_lld=false
            v8_enable_i18n_support=false
            treat_warnings_as_errors=false
            clang_use_chrome_plugins=false
          '
          ninja -C out/release v8_monolith

      - name: JNI 브릿지 컴파일
        run: |
          mkdir -p build/darwin-x64
          clang++ \
            -I$JAVA_HOME/include \
            -I$JAVA_HOME/include/darwin \
            -Iv8-include \
            -Ijni \
            -arch x86_64 \
            -fPIC -std=c++17 -O3 -DNDEBUG \
            -DV8_COMPRESS_POINTERS \
            -DV8_31BIT_SMIS_ON_64BIT_ARCH \
            -w \
            -c jni/kr_co_coocon_v8_V8Impl.cpp \
            -o build/darwin-x64/v8impl.o

          clang++ \
            -shared \
            -arch x86_64 \
            -lc++ \
            -undefined dynamic_lookup \
            -o build/darwin-x64/libcooconv8.dylib \
            build/darwin-x64/v8impl.o \
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

      - name: 검증
        run: |
          file build/darwin-x64/libcooconv8.dylib
          ls -lh build/darwin-x64/libcooconv8.dylib

      - name: 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: darwin-x64
          path: |
            build/darwin-x64/libcooconv8.dylib
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

  # ===================================================
  # Linux x86_64
  # ===================================================
  linux-x64:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux-x64' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 도구 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang lld llvm
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $HOME/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: V8 소스 받기
        run: |
          cd $HOME
          mkdir v8-build && cd v8-build
          gclient config https://chromium.googlesource.com/v8/v8.git
          gclient sync --revision ${{ env.V8_VERSION }} --no-history --shallow

      - name: V8 소스 패치
        run: |
          bash patches/apply-patches.sh $HOME/v8-build/v8

      - name: V8 모놀리스 빌드
        run: |
          cd $HOME/v8-build/v8
          gn gen out/release --args='
            is_debug=false
            target_cpu="x64"
            host_cpu="x64"
            target_os="linux"
            v8_monolithic=true
            v8_use_external_startup_data=false
            is_component_build=false
            use_custom_libcxx=false
            v8_enable_i18n_support=false
            treat_warnings_as_errors=false
            clang_use_chrome_plugins=false
          '
          ninja -C out/release v8_monolith

      - name: JNI 브릿지 컴파일
        run: |
          mkdir -p build/linux-x64
          clang++ \
            -I$JAVA_HOME/include \
            -I$JAVA_HOME/include/linux \
            -Iv8-include \
            -Ijni \
            -fPIC -std=c++17 -O3 -DNDEBUG \
            -DV8_COMPRESS_POINTERS \
            -DV8_31BIT_SMIS_ON_64BIT_ARCH \
            -w \
            -c jni/kr_co_coocon_v8_V8Impl.cpp \
            -o build/linux-x64/v8impl.o

          clang++ \
            -shared \
            -o build/linux-x64/libcooconv8.so \
            build/linux-x64/v8impl.o \
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a \
            -lstdc++ -lrt \
            -s

      - name: 검증
        run: |
          file build/linux-x64/libcooconv8.so
          ls -lh build/linux-x64/libcooconv8.so

      - name: 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            build/linux-x64/libcooconv8.so
            $HOME/v8-build/v8/out/release/obj/libv8_monolith.a

  # ===================================================
  # Windows x86_64
  # ===================================================
  windows-x64:
    if: ${{ github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows-x64' }}
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: depot_tools 설치
        shell: cmd
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git %USERPROFILE%\depot_tools
          echo %USERPROFILE%\depot_tools>> %GITHUB_PATH%

      - name: V8 소스 받기
        shell: cmd
        run: |
          mkdir %USERPROFILE%\v8-build
          cd %USERPROFILE%\v8-build
          call fetch v8
          cd v8
          call git checkout %V8_VERSION%
          call gclient sync

      - name: V8 모놀리스 빌드
        shell: cmd
        run: |
          cd %USERPROFILE%\v8-build\v8
          call gn gen out/release --args="is_debug=false target_cpu=\"x64\" v8_monolithic=true v8_use_external_startup_data=false is_component_build=false v8_enable_i18n_support=false treat_warnings_as_errors=false is_clang=false"
          call ninja -C out/release v8_monolith

      - name: JNI 브릿지 컴파일
        shell: cmd
        run: |
          mkdir build\windows-x64
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cl /std:c++17 /O2 /DNDEBUG /DV8_COMPRESS_POINTERS /DV8_31BIT_SMIS_ON_64BIT_ARCH /w ^
            /I"%JAVA_HOME%\include" /I"%JAVA_HOME%\include\win32" ^
            /Iv8-include /Ijni ^
            /c jni\kr_co_coocon_v8_V8Impl.cpp ^
            /Fo:build\windows-x64\v8impl.obj
          link /DLL /OUT:build\windows-x64\libcooconv8.dll ^
            build\windows-x64\v8impl.obj ^
            %USERPROFILE%\v8-build\v8\out\release\obj\v8_monolith.lib ^
            userenv.lib IPHLPAPI.lib Ws2_32.lib WINMM.lib psapi.lib

      - name: 검증
        shell: cmd
        run: |
          dir build\windows-x64\libcooconv8.dll

      - name: 산출물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            build/windows-x64/libcooconv8.dll
            ${{ env.USERPROFILE }}/v8-build/v8/out/release/obj/v8_monolith.lib
